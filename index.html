        this.spinVel *= Math.pow(0.22, dt);
        if (!this.grabbed && Math.abs(this.spinVel) < 1.2) {
          this.spinVel += (this.spinVel >= 0 ? 1.2 : -1.2) - this.spinVel;
        }

        // Colour wash on lobes
        const lobes = this.el.querySelectorAll('.lobe');
        for (let i = 0; i < lobes.length; i++) {
          const h = (hue + i * 120) % 360;
          lobes[i].setAttribute(
            'material',
            'color: hsl(' + h + ',95%,58%); metalness: 0.55; roughness: 0.15; ' +
            'emissive: hsl(' + h + ',100%,40%); emissiveIntensity: ' +
            (0.45 + Math.min(1.2, Math.abs(this.spinVel) * 0.08))
          );
        }
        const cap = this.el.querySelector('.cap');
        if (cap) {
          cap.setAttribute(
            'material',
            'color: #fff6c8; metalness: 0.9; roughness: 0.1; emissive: #ffe566; emissiveIntensity: 0.8'
          );
        }

        // Soft glow light
        const light = this.el.querySelector('[light]');
        if (light) {
          light.setAttribute(
            'light',
            'type: point; color: hsl(' + hue + ',100%,70%); intensity: ' +
            (0.8 + Math.min(2, Math.abs(this.spinVel) * 0.12)) + '; distance: 3.5'
          );
        }

        if (this.grabbed || !cam) return;

        // Float at hand height in front of you
        cam.object3D.getWorldPosition(this._tmp);
        cam.object3D.getWorldQuaternion(this._quat);
        const forward = this._tmp2.set(0, 0, -1).applyQuaternion(this._quat);
        const right = new AFRAME.THREE.Vector3(1, 0, 0).applyQuaternion(this._quat);
        const bob = Math.sin(t * 0.002) * 0.025;
        const target = new AFRAME.THREE.Vector3()
          .copy(this._tmp)
          .addScaledVector(forward, 0.45)
          .addScaledVector(right, this.data.side)
          .add(new AFRAME.THREE.Vector3(0, -0.12 + bob, 0));
        if (this.el.parentNode !== this.el.sceneEl) {
          this.el.sceneEl.appendChild(this.el);
        }
        this.el.object3D.position.lerp(target, 1 - Math.pow(0.0005, dt));
        // Face the user gently
        this.el.object3D.quaternion.slerp(this._quat, 0.08);
      }
    });

    /** Re-broadcast hand grab events on the scene (reliable for toys) */
    AFRAME.registerComponent('grab-bus', {
      init: function () {
        const scene = this.el;
        const bind = (hand) => {
          if (!hand || hand._grabBus) return;
          hand._grabBus = true;
          hand.addEventListener('grabstarted', (e) => {
            scene.emit('grabstarted', e.detail, false);
          });
          hand.addEventListener('grabended', (e) => {
            scene.emit('grabended', e.detail, false);
          });
        };
        const hook = () => {
          bind(document.getElementById('leftHand'));
          bind(document.getElementById('rightHand'));
        };
        hook();
        this.el.addEventListener('loaded', hook);
      }
    });

    /** Watch pinch on hands — spray sparks from palm */
    AFRAME.registerComponent('hand-trippy', {
      init: function () {
        this.el.addEventListener('pinchstarted', (e) => {
          const d = e.detail && e.detail.position;
          if (!d) return;
          const scene = this.el.sceneEl;
          for (let i = 0; i < 8; i++) {
            const spark = document.createElement('a-sphere');
            spark.setAttribute('radius', 0.015 + Math.random() * 0.03);
            spark.setAttribute('position', d.x + ' ' + d.y + ' ' + d.z);
            const hue = (performance.now() * 0.08 + i * 40) % 360;
            spark.setAttribute(
              'material',
              'shader: flat; color: hsl(' + hue + ',100%,65%); transparent: true; opacity: 0.95'
            );
            scene.appendChild(spark);
            const vx = (Math.random() - 0.5) * 0.8;
            const vy = (Math.random() - 0.5) * 0.8;
            const vz = (Math.random() - 0.5) * 0.8;
            let age = 0;
            const iv = setInterval(() => {
              age += 0.05;
              if (!spark.parentNode || age > 0.7) {
                clearInterval(iv);
                if (spark.parentNode) spark.parentNode.removeChild(spark);
                return;
              }
              spark.object3D.position.x += vx * 0.05;
              spark.object3D.position.y += vy * 0.05;
              spark.object3D.position.z += vz * 0.05;
            }, 50);
          }
        });
      }
    });
  </script>
</head>
<body>
  <div id="audio-gate"><span>Tap to enable sound &amp; enter<small>tunnel8 · pinch the fidget spinner · colourful hands</small></span></div>
  <button type="button" id="audio-resume">Tap for sound</button>

  <a-scene
    background="color: #000008"
    fog="type: exponential; color: #000008; density: 0.006"
    renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: true"
    webxr="optionalFeatures: hand-tracking, local-floor, bounded-floor"
    obb-collider="showColliders: false"
    grab-bus
  >
    <a-entity light="type: ambient; color: #778899; intensity: 0.4"></a-entity>
    <a-entity id="mood-light" light="type: point; color: #ff4080; intensity: 0.65; distance: 28" position="0 0 -5"></a-entity>
    <a-entity light="type: point; color: #b8ffd0; intensity: 1.6; distance: 10" position="-0.8 0.3 -2.0"></a-entity>
    <a-entity light="type: directional; color: #ffffff; intensity: 1.15" position="2 3 1"></a-entity>

    <!-- Cube is NOT under the camera. World position updated along tunnel only. -->
    <a-box
      id="hero-cube"
      tunnel-anchored-cube="dist: 2.4"
      position="0 0 -2.4"
      width="0.28"
      height="0.28"
      depth="0.28"
      material="color: #7dffb0; metalness: 1; roughness: 0.06; emissive: #1a8f4a; emissiveIntensity: 0.35"
      animation="property: rotation; to: 360 360 360; loop: true; dur: 28000; easing: linear"
    ></a-box>
    <a-entity id="cube-light" light="type: point; color: #ffffff; intensity: 3.2; distance: 8" position="0.25 0.25 -1.8"></a-entity>

    <!-- Fidget spinner — floats at hand height; pinch lobes to grab & flick -->
    <a-entity
      id="fidget"
      grabbable
      fidget-spinner="side: 0.2"
      position="0.2 1.2 -0.45"
      scale="1 1 1"
    >
      <a-entity light="type: point; color: #ff88ee; intensity: 1; distance: 3"></a-entity>
      <!-- bearing / cap -->
      <a-cylinder
        class="cap"
        radius="0.035"
        height="0.028"
        material="color: #fff6c8; metalness: 0.9; roughness: 0.1; emissive: #ffe566; emissiveIntensity: 0.7"
      ></a-cylinder>
      <a-entity class="rotor">
        <a-sphere class="lobe" position="0.09 0 0" radius="0.048"
          material="color: #ff4d9a; emissive: #ff2a7a; emissiveIntensity: 0.6"></a-sphere>
        <a-sphere class="lobe" position="-0.045 0 0.078" radius="0.048"
          material="color: #4dffc3; emissive: #22e0a0; emissiveIntensity: 0.6"></a-sphere>
        <a-sphere class="lobe" position="-0.045 0 -0.078" radius="0.048"
          material="color: #6a8cff; emissive: #4060ff; emissiveIntensity: 0.6"></a-sphere>
        <!-- arms -->
        <a-box position="0.045 0 0" width="0.08" height="0.016" depth="0.028"
          material="color: #ffcc66; metalness: 0.6; roughness: 0.2; emissive: #ffaa22; emissiveIntensity: 0.35"></a-box>
        <a-box position="-0.022 0 0.039" rotation="0 60 0" width="0.08" height="0.016" depth="0.028"
          material="color: #88ffee; metalness: 0.6; roughness: 0.2; emissive: #44ddcc; emissiveIntensity: 0.35"></a-box>
        <a-box position="-0.022 0 -0.039" rotation="0 -60 0" width="0.08" height="0.016" depth="0.028"
          material="color: #c8a0ff; metalness: 0.6; roughness: 0.2; emissive: #9966ff; emissiveIntensity: 0.35"></a-box>
      </a-entity>
    </a-entity>

    <!-- Extra soft orb to pinch too -->
    <a-entity
      id="prism-ball"
      grabbable
      trippy-toy="home: -0.25 -0.12 0.45; hueSpeed: 70"
      position="-0.25 1.15 -0.42"
      geometry="primitive: icosahedron; radius: 0.07"
      material="color: #66ffcc; metalness: 0.5; roughness: 0.08; emissive: #22ffaa; emissiveIntensity: 0.65"
    >
      <a-entity light="type: point; color: #66ffcc; intensity: 1.0; distance: 3"></a-entity>
    </a-entity>

    <a-entity id="rig" position="0 0 0">
      <a-camera
        id="cam"
        position="0 0 0"
        look-controls="enabled: true"
        wasd-controls="enabled: false"
      ></a-camera>
    </a-entity>

    <!-- Hands at scene root so XR poses / grab colliders stay correct -->
    <a-entity
      id="leftHand"
      hand-tracking-controls="hand: left; modelStyle: mesh; modelColor: #9bffe0"
      hand-tracking-grab-controls="hand: left; color: #9bffe0; hoverColor: #ffe600; hoverEnabled: true"
      hand-trippy
    ></a-entity>
    <a-entity
      id="rightHand"
      hand-tracking-controls="hand: right; modelStyle: mesh; modelColor: #ffb8e8"
      hand-tracking-grab-controls="hand: right; color: #ffb8e8; hoverColor: #ffe600; hoverEnabled: true"
      hand-trippy
    ></a-entity>

    <a-entity hex-tunnel="speed: 0.052"></a-entity>
  </a-scene>

  <script>
    const gate = document.getElementById('audio-gate');
    const resumeBtn = document.getElementById('audio-resume');
    let unlocking = false;

    async function unlockAudio() {
      if (unlocking) return;
      unlocking = true;
      try {
        await TunnelDrone.start();
        if (TunnelDrone.ctx && TunnelDrone.ctx.state === 'suspended') {
          await TunnelDrone.ctx.resume();
        }
        // Quest / iOS often need a short buffer play inside the gesture
        if (TunnelDrone.ctx) {
          const buf = TunnelDrone.ctx.createBuffer(1, 1, TunnelDrone.ctx.sampleRate);
          const src = TunnelDrone.ctx.createBufferSource();
          src.buffer = buf;
          src.connect(TunnelDrone.ctx.destination);
          src.start(0);
        }
        gate.hidden = true;
        resumeBtn.classList.remove('show');
        document.body.classList.add('audio-on');
      } catch (e) {
        console.warn('Audio unlock failed', e);
        resumeBtn.classList.add('show');
      } finally {
        unlocking = false;
      }
    }

    async function resumeAudio() {
      if (!TunnelDrone.ctx) {
        await unlockAudio();
        return;
      }
      try {
        await TunnelDrone.ctx.resume();
        resumeBtn.classList.remove('show');
      } catch (e) {
        resumeBtn.classList.add('show');
      }
    }

    function onGatePointer(e) {
      e.preventDefault();
      unlockAudio();
    }
    gate.addEventListener('click', onGatePointer);
    gate.addEventListener('touchend', onGatePointer, { passive: false });
    resumeBtn.addEventListener('click', function (e) {
      e.preventDefault();
      resumeAudio();
    });
    resumeBtn.addEventListener('touchend', function (e) {
      e.preventDefault();
      resumeAudio();
    }, { passive: false });

    const sceneEl = document.querySelector('a-scene');
    sceneEl.addEventListener('enter-vr', function () {
      // Immersive mode often suspends AudioContext — try resume; show tap if needed
      if (TunnelDrone.ctx) {
        TunnelDrone.ctx.resume().then(function () {
          if (TunnelDrone.ctx.state !== 'running') resumeBtn.classList.add('show');
        }).catch(function () {
          resumeBtn.classList.add('show');
        });
      } else {
        resumeBtn.classList.add('show');
      }
    });
    sceneEl.addEventListener('exit-vr', function () {
      resumeAudio();
    });

    // If context suspends later, surface the tap button
    setInterval(function () {
      if (!TunnelDrone.running || !TunnelDrone.ctx) return;
      if (TunnelDrone.ctx.state === 'suspended' && gate.hidden) {
        resumeBtn.classList.add('show');
      }
    }, 2000);
  </script>
</body>
</html>
